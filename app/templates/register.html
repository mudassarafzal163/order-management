{% extends 'base.html' %}
{% block content %}
<style>
    .auth-box {
        max-width: 420px;
        margin: 80px auto;
        background: white;
        border-radius: 12px;
        padding: 40px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }
    .auth-box h2 { margin-bottom: 24px; color: #1a1a2e; font-size: 22px; }
    .auth-box input {
        width: 100%;
        padding: 12px 16px;
        margin-bottom: 16px;
        border: 1px solid #ddd;
        border-radius: 8px;
        font-size: 14px;
        outline: none;
    }
    .auth-box input:focus { border-color: #4ecca3; }
    .auth-box button {
        width: 100%;
        padding: 12px;
        background: #4ecca3;
        color: #1a1a2e;
        font-weight: 700;
        border: none;
        border-radius: 8px;
        font-size: 15px;
        cursor: pointer;
    }
    .auth-box p { margin-top: 16px; font-size: 13px; color: #666; text-align: center; }
    .auth-box a { color: #4ecca3; text-decoration: none; font-weight: 600; }
</style>

<div class="auth-box">
    <h2>🏪 Register your shop</h2>
    <form method="POST">
        <input type="text" name="shop_name" placeholder="Shop Name (e.g. Karachi Kicks)" required>
        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit">Create Account</button>
    </form>
    <p>Already have account? <a href="{{ url_for('main.login') }}">Login</a></p>
</div>
{% endblock %}
